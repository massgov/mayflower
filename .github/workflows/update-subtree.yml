name: Update Subtrees

on:
  workflow_dispatch:
  schedule:
    # Run weekly on Mondays at 9 AM UTC, which is 5 AM EST same as circleci does.
    - cron: '0 9 * * 1'

jobs:
  update_subtrees:
    name: Update Git Subtrees
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.email "ci.bot@mass.gov"
          git config --global user.name "MassGov Bot"
          mkdir -p $HOME/.ssh && echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Update React Subtree
        run: |
          git subtree pull --prefix=react/ git@github.com:massgov/mayflower-react.git develop || echo "React subtree update failed"

      - name: Update Patternlab Subtree
        run: |
          git subtree pull --prefix=patternlab/ git@github.com:massgov/mayflower.git dev || echo "Patternlab subtree update failed"

      - name: Update Docs Subtree
        run: |
          git subtree pull --prefix=docs/ git@github.com:massgov/mayflower-doc.git master || echo "Docs subtree update failed"

      - name: Push changes
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            git push origin ${{ github.ref_name }}
          else
            echo "No changes to push"
          fi
